name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - feature/githubpages
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/kibo-tag-aprilcube/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build root library
        run: npm run build

      - name: Run root unit tests
        run: npm test

      - name: Install example dependencies
        working-directory: examples/kibo-tag-aprilcube
        run: npm ci

      - name: Run example typecheck
        working-directory: examples/kibo-tag-aprilcube
        run: npm run typecheck

      - name: Run example unit tests
        working-directory: examples/kibo-tag-aprilcube
        run: npm test

      - name: Verify runtime artifacts
        working-directory: examples/kibo-tag-aprilcube
        run: npm run verify:runtime-artifacts

      - name: Build GitHub Pages demo
        working-directory: examples/kibo-tag-aprilcube
        run: npm run build:pages

      - name: Install Playwright Chromium
        working-directory: examples/kibo-tag-aprilcube
        run: npx playwright install chromium --with-deps

      - name: Run Pages-like browser smoke test
        working-directory: examples/kibo-tag-aprilcube
        run: npm run test:browser:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/kibo-tag-aprilcube/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
